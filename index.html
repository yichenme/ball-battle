<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ball Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ── SELECTION SCREEN ── */
    #select-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #select-screen h1 {
      font-size: 2rem;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    #select-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .player-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-title {
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 3px;
    }
    .player-title.red    { color: #e74c3c; }
    .player-title.blue   { color: #3498db; }
    .player-title.green  { color: #2ecc71; }
    .player-title.orange { color: #f39c12; }

    .role-grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 500px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 #1a1a1a;
      padding-right: 2px;
    }
    .role-grid::-webkit-scrollbar { width: 4px; }
    .role-grid::-webkit-scrollbar-track { background: #1a1a1a; }
    .role-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .role-card {
      width: 140px;
      background: #1c1c1c;
      border: 2px solid #2e2e2e;
      border-radius: 7px;
      padding: 6px 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
    }
    .role-card:hover { background: #262626; border-color: #444; }
    .role-card.sel-red    { border-color: #e74c3c; background: #2a1212; }
    .role-card.sel-blue   { border-color: #3498db; background: #0e1e2c; }
    .role-card.sel-green  { border-color: #2ecc71; background: #0e2a1a; }
    .role-card.sel-orange { border-color: #f39c12; background: #2a1e08; }

    .role-name { font-size: 0.82rem; font-weight: bold; margin-bottom: 2px; }
    .role-desc { font-size: 0.58rem; color: #777; line-height: 1.35; }

    .vs-divider {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2a2a2a;
      align-self: center;
      padding: 0 2px;
    }

    #start-btn {
      padding: 12px 36px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 2px;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      background: #e74c3c;
      color: #fff;
      transition: opacity 0.15s, transform 0.1s;
    }
    #start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #start-btn:not(:disabled):hover { transform: scale(1.04); }

    /* ── GAME SCREEN ── */
    #game-screen { display: none; }
    #game-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      background: #111;
    }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.78);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #overlay.visible { display: flex; }

    #winner-text { font-size: 2.4rem; font-weight: bold; letter-spacing: 2px; }

    .o-btn {
      padding: 10px 26px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 1px;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      background: #eee;
      color: #111;
    }
    .o-btn:hover { background: #fff; }
  </style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="select-screen">
  <h1>Ball Battle</h1>
  <div id="select-row">
    <div class="player-section">
      <div class="player-title red">RED</div>
      <div class="role-grid" id="grid-red"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title blue">BLUE</div>
      <div class="role-grid" id="grid-blue"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title green">GREEN</div>
      <div class="role-grid" id="grid-green"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title orange">ORANGE</div>
      <div class="role-grid" id="grid-orange"></div>
    </div>
  </div>
  <button id="start-btn" disabled>SELECT ALL 4 ROLES TO FIGHT</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="860" height="480"></canvas>
    <div id="overlay">
      <div id="winner-text"></div>
      <button class="o-btn" id="play-again">PLAY AGAIN</button>
      <button class="o-btn" id="change-roles">CHANGE ROLES</button>
    </div>
  </div>
</div>

<script>
// ── ROLE DEFINITIONS ──
const ROLES = [
  { id: 'normal',     name: 'Normal',     desc: '110 HP. No ability — rewarded with extra health.' },
  { id: 'shadow',     name: 'Shadow',     desc: '90 HP. Phases invisible & invincible for 1.5s every 6s.' },
  { id: 'wukong',     name: 'Wukong',     desc: '110 HP. Spawns 3 damage-dealing clones. HP hidden.' },
  { id: 'death',      name: 'Death',      desc: '120 HP. Drains 3 HP/0.6s from enemies within 80px.' },
  { id: 'laser',      name: 'Laser',      desc: '85 HP. Charges up, then fires a glowing cross beam.' },
  { id: 'tank',       name: 'Tank',       desc: '140 HP. Deals 18 collision damage. Large hitbox.' },
  { id: 'ghost',      name: 'Ghost',      desc: '90 HP. Passes through walls — unpredictable movement.' },
  { id: 'vampire',    name: 'Vampire',    desc: '100 HP. Heals 8 HP from every collision hit.' },
  { id: 'bomb',       name: 'Bomb',       desc: '105 HP. Explodes every 5s — 30 damage within 80px.' },
  { id: 'berserker',  name: 'Berserker',  desc: '90 HP. Damage rises from 10→30 as HP falls.' },
  { id: 'zatan',      name: 'Zatan',      desc: '100 HP. Fires 5 homing soul orbs every 5s (18 dmg each).' },
  { id: 'momy',       name: 'Momy',       desc: '115 HP. Bubble shield every 7s absorbs one hit. Regens 1 HP/s.' },
  { id: 'troll',      name: 'Troll',      desc: '165 HP. Slow & huge. Regens 3 HP/0.8s. 15 col. dmg.' },
  { id: 'dragon',     name: 'Dragon',     desc: '105 HP. Charges then breathes fire — 20 dmg + burn DOT.' },
  { id: 'challenger', name: 'Challenger', desc: '95 HP. Marks strongest foe & rushes them. Kills restore 50 HP.' },
  { id: 'spider',     name: 'Spider',     desc: '82 HP. Fast. Drops webs every 3s — slows enemies 60%.' },
];

const ROLE_CFG = {
  normal:     { hp: 110, radius: 20, colDmg: 10 },
  shadow:     { hp: 90,  radius: 20, colDmg: 10 },
  wukong:     { hp: 110, radius: 20, colDmg: 10 },
  death:      { hp: 120, radius: 20, colDmg: 10 },
  laser:      { hp: 85,  radius: 18, colDmg: 10 },
  tank:       { hp: 140, radius: 26, colDmg: 18 },
  ghost:      { hp: 90,  radius: 20, colDmg: 10 },
  vampire:    { hp: 100, radius: 20, colDmg: 10 },
  bomb:       { hp: 105, radius: 20, colDmg: 10 },
  berserker:  { hp: 90,  radius: 20, colDmg: 10 },
  zatan:      { hp: 100, radius: 20, colDmg: 10 },
  momy:       { hp: 115, radius: 22, colDmg: 10 },
  troll:      { hp: 165, radius: 25, colDmg: 15, speedMult: 0.85 },
  dragon:     { hp: 105, radius: 22, colDmg: 12 },
  challenger: { hp: 95,  radius: 20, colDmg: 10 },
  spider:     { hp: 82,  radius: 17, colDmg: 8,  speedMult: 1.35 },
};

const PLAYERS = [
  { id: 'red',    color: '#e74c3c', label: 'RED'    },
  { id: 'blue',   color: '#3498db', label: 'BLUE'   },
  { id: 'green',  color: '#2ecc71', label: 'GREEN'  },
  { id: 'orange', color: '#f39c12', label: 'ORANGE' },
];

const SPEED = 3.5;

// ── SELECTION UI ──
const chosen = { red: null, blue: null, green: null, orange: null };

function buildGrid(pid) {
  const grid = document.getElementById('grid-' + pid);
  ROLES.forEach(r => {
    const card = document.createElement('div');
    card.className = 'role-card';
    card.dataset.role = r.id;
    card.innerHTML = `<div class="role-name">${r.name}</div><div class="role-desc">${r.desc}</div>`;
    card.addEventListener('click', () => {
      chosen[pid] = r.id;
      grid.querySelectorAll('.role-card').forEach(c => c.classList.remove('sel-' + pid));
      card.classList.add('sel-' + pid);
      const btn = document.getElementById('start-btn');
      if (PLAYERS.every(p => chosen[p.id])) { btn.disabled = false; btn.textContent = 'FIGHT!'; }
    });
    grid.appendChild(card);
  });
}
PLAYERS.forEach(p => buildGrid(p.id));

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('visible');
  balls.forEach(b => b.reset());
  webs.length = 0;
  particles.length = 0; shockwaves.length = 0; damageNumbers.length = 0; shakeAmount = 0;
  state = 'playing'; lastTime = 0;
  requestAnimationFrame(gameLoop);
});
document.getElementById('change-roles').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  PLAYERS.forEach(p => { chosen[p.id] = null; });
  document.querySelectorAll('.role-card').forEach(c =>
    c.classList.remove('sel-red','sel-blue','sel-green','sel-orange'));
  const btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = 'SELECT ALL 4 ROLES TO FIGHT';
});

// ── CANVAS ──
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function randVel() {
  const a = Math.random() * Math.PI * 2;
  return [Math.cos(a) * SPEED, Math.sin(a) * SPEED];
}

// ── GLOBAL FX ARRAYS ──
const particles    = [];
const shockwaves   = [];
const damageNumbers = [];
const webs         = [];

// ── BALL CLASS ──
class Ball {
  constructor(sx, sy, color, name, role) {
    this.startX = sx; this.startY = sy;
    this.color = color; this.name = name; this.role = role;
    const c = ROLE_CFG[role];
    this.maxHp = c.hp; this.radius = c.radius; this.colDmg = c.colDmg;
    this.reset();
  }

  reset() {
    this.x = this.startX; this.y = this.startY;
    [this.vx, this.vy] = randVel();
    this.hp = this.maxHp;
    this.alive = true; this.dying = false; this.dyingTimer = 0;
    this.scale = 1; this.hitFlash = 0; this.healFlash = 0; this.colCooldown = 0;
    this.trail = [];

    // Status effects
    this.burnTimer = 0; this.burnTickTimer = 0; this.burnDmg = 4;
    this.slowTimer = 0;

    // Shadow
    this.shadowCycle = 2500; this.phased = false;

    // Wukong
    this.cloneTimer = 3500; this.clones = [];

    // Death
    this.auraTimer = 600;

    // Laser (improved)
    this.laserTimer    = 3000;
    this.laserCharging = false; this.laserChargeDur = 0;
    this.laserActive   = false; this.laserDur = 0;
    this.laserX = 0; this.laserY = 0; this.laserHitCD = 0;

    // Bomb
    this.bombTimer = 5000; this.bombWarning = false;
    this.bombWarnTimer = 0; this.bombExploding = false; this.bombExplodeDur = 0;

    // Zatan
    this.zatanTimer = 2000; this.souls = [];

    // Momy
    this.momyShieldTimer = 0; this.momyShield = false; this.momyRegenTimer = 0;

    // Troll
    this.trollRegenTimer = 0;

    // Dragon
    this.dragonTimer      = 3000;
    this.dragonCharging   = false; this.dragonChargeDur  = 0;
    this.dragonBreathing  = false; this.dragonBreathDur  = 0;
    this.dragonBreathAngle = 0;

    // Challenger
    this.challengeTarget    = null;
    this.challengeMarkTimer = 500;

    // Spider
    this.spiderWebTimer = 3000;
  }

  takeDamage(amount) {
    if (!this.alive) return;
    if (this.role === 'shadow' && this.phased) return;
    // Momy shield absorbs
    if (this.role === 'momy' && this.momyShield) {
      this.momyShield = false;
      this.momyShieldTimer = 0;
      spawnShockwave(this.x, this.y, 55, '#ff9cf4');
      spawnParticles(this.x, this.y, '#ff9cf4', 14);
      triggerShake(3);
      return;
    }
    this.hp = Math.max(0, this.hp - amount);
    this.hitFlash = 1.0;
    spawnDamageNumber(this.x + (Math.random()-0.5)*20, this.y - this.radius - 6, `-${amount}`, '#ff7070');
    if (this.hp === 0) {
      this.alive = false;
      this.dying = true;
      this.dyingTimer = 350;
      spawnParticles(this.x, this.y, this.color, 20);
      spawnShockwave(this.x, this.y, 80, this.color);
      triggerShake(10);
    }
  }

  gainHp(amount) {
    if (!this.alive) return;
    this.hp = Math.min(this.maxHp, this.hp + amount);
    this.healFlash = 1.0;
    spawnDamageNumber(this.x + (Math.random()-0.5)*20, this.y - this.radius - 6, `+${amount}`, '#55ee88');
  }

  update(others, dt) {
    if (!this.alive) {
      if (this.dying) {
        this.dyingTimer -= dt;
        this.scale = Math.max(0, this.dyingTimer / 350);
        if (this.dyingTimer <= 0) this.dying = false;
      }
      return;
    }

    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.pop();

    if (this.hitFlash  > 0) this.hitFlash  = Math.max(0, this.hitFlash  - dt / 220);
    if (this.healFlash > 0) this.healFlash = Math.max(0, this.healFlash - dt / 300);
    if (this.colCooldown > 0) this.colCooldown -= dt;

    // ── BURN DOT ──
    if (this.burnTimer > 0) {
      this.burnTimer -= dt;
      this.burnTickTimer -= dt;
      if (this.burnTickTimer <= 0) {
        this.burnTickTimer = 400;
        const dmg = this.burnDmg || 4;
        this.hp = Math.max(0, this.hp - dmg);
        this.hitFlash = 0.7;
        spawnDamageNumber(this.x + (Math.random()-0.5)*20, this.y - this.radius - 6, `-${dmg}`, '#ff8800');
        spawnParticles(this.x + (Math.random()-0.5)*this.radius*2,
                       this.y + (Math.random()-0.5)*this.radius*2, '#ff5500', 2);
        if (this.hp === 0 && this.alive) {
          this.alive = false; this.dying = true; this.dyingTimer = 350;
          spawnParticles(this.x, this.y, this.color, 20);
          spawnShockwave(this.x, this.y, 80, this.color);
          triggerShake(10);
        }
      }
      if (this.alive && Math.random() < 0.3)
        spawnParticles(this.x + (Math.random()-0.5)*this.radius*2,
                       this.y + (Math.random()-0.5)*this.radius*2,
                       Math.random() < 0.5 ? '#ff6600' : '#ff3300', 1);
    }

    // ── BERSERKER SPARKS ──
    if (this.role === 'berserker' && this.hp < this.maxHp * 0.5 && Math.random() < 0.08)
      spawnParticles(this.x + (Math.random()-0.5)*this.radius,
                     this.y + (Math.random()-0.5)*this.radius, '#ff4400', 1);

    // ── SHADOW ──
    if (this.role === 'shadow') {
      this.shadowCycle = (this.shadowCycle + dt) % 6000;
      this.phased = this.shadowCycle < 1500;
    }

    // ── WUKONG CLONES ──
    if (this.role === 'wukong') {
      this.cloneTimer -= dt;
      if (this.cloneTimer <= 0) {
        for (let i = 0; i < 3; i++) {
          const a = Math.random() * Math.PI * 2;
          this.clones.push({ x: this.x, y: this.y, vx: Math.cos(a)*SPEED, vy: Math.sin(a)*SPEED, life: 4000 });
        }
        this.cloneTimer = 4000;
      }
      for (let i = this.clones.length - 1; i >= 0; i--) {
        const c = this.clones[i];
        c.x += c.vx; c.y += c.vy;
        if (c.x - this.radius < 0)     { c.x = this.radius;     c.vx =  Math.abs(c.vx); }
        else if (c.x + this.radius > W) { c.x = W-this.radius;   c.vx = -Math.abs(c.vx); }
        if (c.y - this.radius < 0)     { c.y = this.radius;     c.vy =  Math.abs(c.vy); }
        else if (c.y + this.radius > H) { c.y = H-this.radius;   c.vy = -Math.abs(c.vy); }
        c.life -= dt;
        if (c.life <= 0) this.clones.splice(i, 1);
      }
    }

    // ── DEATH AURA ──
    if (this.role === 'death') {
      this.auraTimer -= dt;
      if (this.auraTimer <= 0) {
        for (const o of others)
          if (Math.hypot(o.x - this.x, o.y - this.y) < 80) o.takeDamage(3);
        this.auraTimer = 600;
      }
    }

    // ── LASER (improved) ──
    if (this.role === 'laser') {
      if (this.laserHitCD > 0) this.laserHitCD -= dt;
      if (!this.laserActive && !this.laserCharging) {
        this.laserTimer -= dt;
        if (this.laserTimer <= 0) {
          this.laserCharging = true; this.laserChargeDur = 650;
        }
      }
      if (this.laserCharging) {
        this.laserChargeDur -= dt;
        // Arc sparks during charge
        if (Math.random() < 0.35) {
          const a = Math.random() * Math.PI * 2;
          const rr = this.radius + 4 + Math.random() * 12;
          spawnParticles(this.x + Math.cos(a)*rr, this.y + Math.sin(a)*rr, this.color, 1);
        }
        if (this.laserChargeDur <= 0) {
          this.laserCharging = false;
          this.laserActive = true; this.laserDur = 1800;
          this.laserX = this.x; this.laserY = this.y;
          this.laserTimer = 4500; this.laserHitCD = 0;
          triggerShake(4);
        }
      }
      if (this.laserActive) {
        this.laserDur -= dt;
        if (this.laserDur <= 0) { this.laserActive = false; }
        else if (this.laserHitCD <= 0) {
          for (const o of others) {
            const hitH = Math.abs(o.y - this.laserY) <= o.radius + 3;
            const hitV = Math.abs(o.x - this.laserX) <= o.radius + 3;
            if (hitH || hitV) {
              o.takeDamage(25);
              spawnShockwave(o.x, o.y, 48, this.color);
              triggerShake(5);
              this.laserHitCD = 700;
              break;
            }
          }
        }
        // Beam sparks
        if (Math.random() < 0.45) {
          spawnParticles(Math.random() * W, this.laserY + (Math.random()-0.5)*6, this.color, 1);
          spawnParticles(this.laserX + (Math.random()-0.5)*6, Math.random() * H, this.color, 1);
        }
      }
    }

    // ── BOMB ──
    if (this.role === 'bomb') {
      this.bombTimer -= dt;
      if (this.bombTimer <= 0 && !this.bombWarning) {
        this.bombWarning = true; this.bombWarnTimer = 600;
      }
      if (this.bombWarning) {
        this.bombWarnTimer -= dt;
        if (this.bombWarnTimer <= 0) {
          this.bombWarning = false; this.bombTimer = 5000;
          this.bombExploding = true; this.bombExplodeDur = 350;
          spawnParticles(this.x, this.y, '#ff6600', 18);
          spawnShockwave(this.x, this.y, 90, '#ff8800');
          triggerShake(12);
          for (const o of others)
            if (Math.hypot(o.x - this.x, o.y - this.y) < 80) o.takeDamage(30);
        }
      }
      if (this.bombExploding) {
        this.bombExplodeDur -= dt;
        if (this.bombExplodeDur <= 0) this.bombExploding = false;
      }
    }

    // ── ZATAN ── homing soul orbs
    if (this.role === 'zatan') {
      this.zatanTimer -= dt;
      if (this.zatanTimer <= 0) {
        for (let i = 0; i < 5; i++) {
          const a = (i / 5) * Math.PI * 2;
          this.souls.push({ x: this.x, y: this.y,
            vx: Math.cos(a) * 2.2, vy: Math.sin(a) * 2.2, life: 3000 });
        }
        this.zatanTimer = 5000;
        spawnShockwave(this.x, this.y, 40, '#9b00c4');
      }
      for (let i = this.souls.length - 1; i >= 0; i--) {
        const s = this.souls[i];
        // Home toward nearest enemy
        let nearDist = Infinity, nearOpp = null;
        for (const o of others) {
          const d = Math.hypot(o.x - s.x, o.y - s.y);
          if (d < nearDist) { nearDist = d; nearOpp = o; }
        }
        if (nearOpp) {
          const dx = nearOpp.x - s.x, dy = nearOpp.y - s.y;
          const d = Math.hypot(dx, dy) || 1;
          s.vx += (dx/d) * 0.13; s.vy += (dy/d) * 0.13;
          const spd = Math.hypot(s.vx, s.vy);
          if (spd > 3.8) { s.vx = (s.vx/spd)*3.8; s.vy = (s.vy/spd)*3.8; }
        }
        s.x += s.vx; s.y += s.vy;
        if (s.x < 0 || s.x > W) s.vx *= -1;
        if (s.y < 0 || s.y > H) s.vy *= -1;
        s.life -= dt;
        // Hit check
        let hit = false;
        for (const o of others) {
          if (Math.hypot(o.x - s.x, o.y - s.y) < o.radius + 7) {
            o.takeDamage(18);
            spawnParticles(s.x, s.y, '#cc44ff', 10);
            spawnShockwave(s.x, s.y, 32, '#9b00c4');
            triggerShake(3);
            hit = true; break;
          }
        }
        if (hit || s.life <= 0) this.souls.splice(i, 1);
      }
    }

    // ── MOMY ── shield + regen
    if (this.role === 'momy') {
      this.momyRegenTimer += dt;
      if (this.momyRegenTimer >= 1000 && this.hp < this.maxHp) {
        this.gainHp(1);
        this.momyRegenTimer = 0;
      } else if (this.hp >= this.maxHp) {
        this.momyRegenTimer = 0;
      }
      if (!this.momyShield) {
        this.momyShieldTimer += dt;
        if (this.momyShieldTimer >= 7000) {
          this.momyShield = true;
          spawnParticles(this.x, this.y, '#ff9cf4', 10);
        }
      }
    }

    // ── TROLL ── slow + regen
    if (this.role === 'troll') {
      this.trollRegenTimer += dt;
      if (this.trollRegenTimer >= 800 && this.hp < this.maxHp) {
        this.gainHp(3);
        this.trollRegenTimer = 0;
        spawnParticles(this.x, this.y, '#2ecc71', 3);
      } else if (this.hp >= this.maxHp) {
        this.trollRegenTimer = 0;
      }
    }

    // ── DRAGON ── charge then fire breath cone
    if (this.role === 'dragon') {
      if (!this.dragonBreathing && !this.dragonCharging) {
        this.dragonTimer -= dt;
        if (this.dragonTimer <= 0) {
          this.dragonCharging = true; this.dragonChargeDur = 600;
        }
      }
      if (this.dragonCharging) {
        this.dragonChargeDur -= dt;
        if (Math.random() < 0.25) {
          const a = Math.atan2(this.vy, this.vx);
          const spread = (Math.random()-0.5) * Math.PI / 2.5;
          spawnParticles(
            this.x + Math.cos(a+spread)*this.radius,
            this.y + Math.sin(a+spread)*this.radius, '#ff8800', 1);
        }
        if (this.dragonChargeDur <= 0) {
          this.dragonCharging = false;
          this.dragonBreathing = true; this.dragonBreathDur = 450;
          this.dragonBreathAngle = Math.atan2(this.vy, this.vx);
          this.dragonTimer = 4500;
          triggerShake(5);
          // Instant cone damage
          const a = this.dragonBreathAngle, half = Math.PI / 5;
          for (const o of others) {
            const dx = o.x - this.x, dy = o.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 135) {
              let ang = Math.atan2(dy, dx) - a;
              while (ang >  Math.PI) ang -= Math.PI*2;
              while (ang < -Math.PI) ang += Math.PI*2;
              if (Math.abs(ang) < half) {
                o.takeDamage(20);
                o.burnTimer = 2200; o.burnTickTimer = 0; o.burnDmg = 4;
              }
            }
          }
          // Particle burst
          for (let i = 0; i < 28; i++) {
            const sp = (Math.random()-0.5) * Math.PI / 2.5;
            const fa = a + sp, d = 14 + Math.random()*120;
            spawnParticles(this.x + Math.cos(fa)*d, this.y + Math.sin(fa)*d,
              Math.random() < 0.5 ? '#ff6600' : '#ffcc00', 1);
          }
        }
      }
      if (this.dragonBreathing) {
        this.dragonBreathDur -= dt;
        if (this.dragonBreathDur <= 0) this.dragonBreathing = false;
        if (Math.random() < 0.45) {
          const a = this.dragonBreathAngle, sp = (Math.random()-0.5)*Math.PI/2.5;
          const d = 10 + Math.random()*130;
          spawnParticles(this.x + Math.cos(a+sp)*d, this.y + Math.sin(a+sp)*d, '#ff4400', 1);
        }
      }
    }

    // ── CHALLENGER ── mark + rush
    if (this.role === 'challenger') {
      this.challengeMarkTimer -= dt;
      if (this.challengeMarkTimer <= 0) {
        this.challengeMarkTimer = 1000;
        this.challengeTarget = others.length > 0
          ? others.reduce((best, o) => o.hp > best.hp ? o : best, others[0])
          : null;
      }
      if (this.challengeTarget && this.challengeTarget.alive) {
        const dx = this.challengeTarget.x - this.x, dy = this.challengeTarget.y - this.y;
        const d = Math.hypot(dx, dy) || 1;
        this.vx += (dx/d) * 0.22; this.vy += (dy/d) * 0.22;
      }
    }

    // ── SPIDER ── web drops
    if (this.role === 'spider') {
      this.spiderWebTimer -= dt;
      if (this.spiderWebTimer <= 0) {
        this.spiderWebTimer = 3000;
        webs.push({ x: this.x, y: this.y, life: 8000, owner: this });
        webs.push({ x: this.x + (Math.random()-0.5)*28, y: this.y + (Math.random()-0.5)*28, life: 8000, owner: this });
        // Cap webs per spider
        let own = webs.filter(w => w.owner === this);
        while (own.length > 6) {
          webs.splice(webs.indexOf(own.shift()), 1);
          own = webs.filter(w => w.owner === this);
        }
      }
    }

    // ── MOVE ──
    this.x += this.vx; this.y += this.vy;
    if (this.role === 'ghost') {
      if (this.x + this.radius < 0)     this.x = W + this.radius;
      else if (this.x - this.radius > W) this.x = -this.radius;
      if (this.y + this.radius < 0)     this.y = H + this.radius;
      else if (this.y - this.radius > H) this.y = -this.radius;
    } else {
      if (this.x - this.radius < 0)      { this.x = this.radius;   this.vx =  Math.abs(this.vx); spawnParticles(this.x, this.y, this.color, 4); }
      else if (this.x + this.radius > W)  { this.x = W-this.radius; this.vx = -Math.abs(this.vx); spawnParticles(this.x, this.y, this.color, 4); }
      if (this.y - this.radius < 0)      { this.y = this.radius;   this.vy =  Math.abs(this.vy); spawnParticles(this.x, this.y, this.color, 4); }
      else if (this.y + this.radius > H)  { this.y = H-this.radius; this.vy = -Math.abs(this.vy); spawnParticles(this.x, this.y, this.color, 4); }
    }

    // ── SPEED NORMALIZATION ──
    let targetSpd = SPEED * (ROLE_CFG[this.role].speedMult || 1);
    if (this.role === 'challenger' && this.challengeTarget && this.challengeTarget.alive)
      targetSpd *= 1.45;
    if (this.slowTimer > 0) { targetSpd *= 0.4; this.slowTimer -= dt; }
    const spd = Math.hypot(this.vx, this.vy);
    if (spd > 0) { this.vx = (this.vx/spd)*targetSpd; this.vy = (this.vy/spd)*targetSpd; }
  }

  draw(ctx) {
    if (!this.alive && !this.dying) return;
    if (this.scale <= 0) return;
    const r = this.radius * this.scale;
    const now = Date.now();

    // ── ZATAN SOULS ──
    if (this.role === 'zatan') {
      for (const s of this.souls) {
        const a = Math.min(1, s.life / 500) * 0.9;
        ctx.save();
        ctx.globalAlpha = a * 0.25;
        ctx.fillStyle = '#ff00aa';
        ctx.beginPath(); ctx.arc(s.x, s.y, 13, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = a * 0.65;
        ctx.fillStyle = '#9b00c4';
        ctx.beginPath(); ctx.arc(s.x, s.y, 7.5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = a;
        ctx.fillStyle = '#dd88ff';
        ctx.beginPath(); ctx.arc(s.x, s.y, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // ── BOMB WARNING/EXPLOSION ──
    if (this.role === 'bomb') {
      if (this.bombWarning) {
        const t = 1 - this.bombWarnTimer / 600;
        ctx.save();
        ctx.strokeStyle = `rgba(255,100,0,${0.4 + t*0.55})`; ctx.lineWidth = 2 + t*2;
        ctx.beginPath(); ctx.arc(this.x, this.y, 40 + t*40, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
      if (this.bombExploding) {
        const t = 1 - this.bombExplodeDur / 350;
        ctx.save();
        ctx.globalAlpha = (1-t) * 0.65;
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.arc(this.x, this.y, 20 + t*80, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // ── DEATH AURA ──
    if (this.role === 'death') {
      const pulse = 0.07 + 0.04 * Math.sin(now / 350);
      ctx.save(); ctx.globalAlpha = pulse;
      ctx.fillStyle = '#7b00a0';
      ctx.beginPath(); ctx.arc(this.x, this.y, 80, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // ── LASER: CHARGE + BEAM ──
    if (this.role === 'laser') {
      // Charge ring
      if (this.laserCharging) {
        const t = 1 - this.laserChargeDur / 650;
        ctx.save();
        // Pulsing outer ring
        ctx.globalAlpha = t * 0.8;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2 + t * 4;
        ctx.beginPath(); ctx.arc(this.x, this.y, r + 5 + t * 14, 0, Math.PI*2); ctx.stroke();
        // Orbiting dots
        for (let i = 0; i < 4; i++) {
          const a = (i/4)*Math.PI*2 + now*0.004;
          ctx.globalAlpha = t * 0.7;
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x + Math.cos(a)*(r+8+t*10), this.y + Math.sin(a)*(r+8+t*10), 2.5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
      // Beam
      if (this.laserActive) {
        const alpha = Math.min(1, this.laserDur / 300);
        ctx.save();
        ctx.lineCap = 'square';
        // Outer glow
        ctx.globalAlpha = alpha * 0.10;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 28;
        ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
        // Mid glow
        ctx.globalAlpha = alpha * 0.28;
        ctx.lineWidth = 10;
        ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
        // Inner glow
        ctx.globalAlpha = alpha * 0.55;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
        // Core beam
        ctx.globalAlpha = alpha * 0.9;
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
        // White hot center
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
        // Intersection flash
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(this.laserX, this.laserY, 6 + (1-alpha)*8, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // ── WUKONG CLONES ──
    if (this.role === 'wukong') {
      for (const c of this.clones) {
        ctx.save();
        ctx.globalAlpha = (c.life / 4000) * 0.45;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(c.x, c.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // ── DRAGON FIRE BREATH VISUAL ──
    if (this.role === 'dragon') {
      if (this.dragonCharging) {
        const t = 1 - this.dragonChargeDur / 600;
        const a = Math.atan2(this.vy, this.vx);
        ctx.save();
        ctx.globalAlpha = t * 0.55;
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 2 + t*3;
        ctx.beginPath(); ctx.arc(this.x, this.y, r + 5 + t*10, a - Math.PI/4, a + Math.PI/4); ctx.stroke();
        ctx.restore();
      }
      if (this.dragonBreathing) {
        const t = this.dragonBreathDur / 450;
        const a = this.dragonBreathAngle, half = Math.PI / 5;
        ctx.save();
        const grad = ctx.createRadialGradient(this.x, this.y, r*0.5, this.x, this.y, 135);
        grad.addColorStop(0,   `rgba(255,220,80,${t*0.95})`);
        grad.addColorStop(0.3, `rgba(255,130,0,${t*0.75})`);
        grad.addColorStop(0.7, `rgba(255,60,0,${t*0.45})`);
        grad.addColorStop(1,   `rgba(255,40,0,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.arc(this.x, this.y, 135, a - half, a + half);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // ── MOMY SHIELD ──
    if (this.role === 'momy') {
      if (this.momyShield) {
        const pulse = 0.45 + 0.3 * Math.sin(now / 160);
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = '#ff9cf4';
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(this.x, this.y, r + 11, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = pulse * 0.15;
        ctx.fillStyle = '#ff9cf4';
        ctx.beginPath(); ctx.arc(this.x, this.y, r + 11, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      } else {
        // Recharge arc
        const prog = Math.min(1, this.momyShieldTimer / 7000);
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#ff9cf4';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r + 9, -Math.PI/2, -Math.PI/2 + prog * Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── TRAIL ──
    for (let i = this.trail.length - 1; i >= 0; i--) {
      const t = this.trail[i];
      const frac = (this.trail.length - i) / this.trail.length;
      ctx.save();
      ctx.globalAlpha = frac * 0.28;
      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, r * frac * 0.7, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // ── LOW-HP PULSE RING ──
    if (this.hp > 0 && this.hp < this.maxHp * 0.3) {
      const pulse = 0.3 + 0.3 * Math.abs(Math.sin(now / 220));
      ctx.save(); ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(this.x, this.y, r + 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // ── MAIN BALL ──
    ctx.save();
    if (this.role === 'shadow' && this.phased) ctx.globalAlpha = 0.22;
    else if (this.role === 'ghost') ctx.globalAlpha = 0.65;

    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();

    // Troll — green sheen
    if (this.role === 'troll') {
      ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.22;
      ctx.fillStyle = '#2ecc71';
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }

    // Zatan — dark pulsing overlay
    if (this.role === 'zatan') {
      const pulse = 0.15 + 0.12 * Math.sin(now / 280);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#7b00a0';
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }

    // Berserker rage
    if (this.role === 'berserker') {
      const rage = 1 - this.hp / this.maxHp;
      if (rage > 0.05) {
        ctx.fillStyle = `rgba(255,30,0,${rage * 0.55})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
      }
    }

    // Hit flash
    if (this.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.hitFlash * 0.75})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }
    // Heal flash
    if (this.healFlash > 0) {
      ctx.fillStyle = `rgba(60,255,120,${this.healFlash * 0.6})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }

    // HP number
    const hideHp = this.role === 'wukong' && this.clones.length > 0;
    if (!hideHp && this.alive) {
      const fontSize = Math.max(9, Math.floor(r * 0.56));
      ctx.globalAlpha = 1;
      ctx.fillStyle = this.hp > this.maxHp * 0.3 ? '#fff' : '#ff8080';
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(this.hp, this.x, this.y);
    }
    ctx.restore();

    // ── SLOW WEB OVERLAY ──
    if (this.slowTimer > 0) {
      const alpha = Math.min(1, this.slowTimer / 500) * 0.55;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + Math.cos(a)*r*1.1, this.y + Math.sin(a)*r*1.1);
        ctx.stroke();
      }
      for (let ri = 1; ri <= 3; ri++) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, r*(ri/3), 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── BURN GLOW RING ──
    if (this.burnTimer > 0) {
      const pulse = 0.3 + 0.25 * Math.abs(Math.sin(now / 120));
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.x, this.y, r + 4, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }
}

// ── ELASTIC COLLISION ──
function resolveCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx, dy) || 1;
  const overlap = (a.radius + b.radius) - dist;
  if (overlap > 0) {
    const nx = dx/dist, ny = dy/dist;
    a.x -= nx*overlap/2; a.y -= ny*overlap/2;
    b.x += nx*overlap/2; b.y += ny*overlap/2;
  }
  const nx = dx/dist, ny = dy/dist;
  const dot = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
  if (dot <= 0) return;
  a.vx -= dot*nx; a.vy -= dot*ny;
  b.vx += dot*nx; b.vy += dot*ny;
}

// ── PARTICLES ──
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*3;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color });
  }
}
function tickParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9;
    p.life -= dt/500;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = p.life * 0.8; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── SHOCKWAVES ──
function spawnShockwave(x, y, maxR = 55, color = '#fff') {
  shockwaves.push({ x, y, r: 4, maxR, life: 1, color });
}
function tickShockwaves(dt) {
  for (let i = shockwaves.length-1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += (s.maxR - s.r) * 0.18;
    s.life -= dt / 350;
    if (s.life <= 0) { shockwaves.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = s.life * 0.5;
    ctx.strokeStyle = s.color; ctx.lineWidth = s.life * 2.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ── DAMAGE NUMBERS ──
function spawnDamageNumber(x, y, text, color) {
  damageNumbers.push({ x, y, text, color, life: 1, vy: -1.2 });
}
function tickDamageNumbers(dt) {
  for (let i = damageNumbers.length-1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy; d.vy *= 0.96; d.life -= dt / 750;
    if (d.life <= 0) { damageNumbers.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color; ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.text, d.x, d.y);
    ctx.restore();
  }
}

// ── WEBS ──
function drawWeb(ctx, w) {
  const alpha = Math.min(0.55, (w.life / 8000) * 0.55);
  const r = 22;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#aaccff';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(w.x, w.y);
    ctx.lineTo(w.x + Math.cos(a)*r, w.y + Math.sin(a)*r);
    ctx.stroke();
  }
  for (let ri = 1; ri <= 3; ri++) {
    ctx.beginPath();
    ctx.arc(w.x, w.y, r*(ri/3), 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

// ── SCREEN SHAKE ──
let shakeAmount = 0;
function triggerShake(amount) { shakeAmount = Math.max(shakeAmount, amount); }

// ── GAME STATE ──
let balls = [], state, lastTime;

function startGame() {
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'block';

  const starts = [
    [180, 120], [680, 120], [180, 360], [680, 360]
  ];
  balls = PLAYERS.map((p, i) =>
    new Ball(starts[i][0], starts[i][1], p.color, p.label, chosen[p.id])
  );

  webs.length = 0;
  particles.length = 0; shockwaves.length = 0; damageNumbers.length = 0; shakeAmount = 0;
  state = 'playing'; lastTime = 0;
  requestAnimationFrame(gameLoop);
}

function showGameOver(winner) {
  const el = document.getElementById('winner-text');
  if (winner) { el.textContent = winner.name + ' WINS!'; el.style.color = winner.color; }
  else        { el.textContent = 'DRAW!';                el.style.color = '#fff'; }
  document.getElementById('overlay').classList.add('visible');
  state = 'gameover';
}

// ── GAME LOOP ──
function gameLoop(ts) {
  if (state !== 'playing') return;
  const dt = lastTime ? ts - lastTime : 16;
  lastTime = ts;

  const aliveBalls = balls.filter(b => b.alive);

  // Snapshot for kill detection (Challenger)
  const aliveSnapshot = new Set(aliveBalls);

  // Update all balls
  for (const b of balls) {
    b.update(aliveBalls.filter(o => o !== b), dt);
  }

  // Challenger kill reward detection
  for (const b of balls) {
    if (aliveSnapshot.has(b) && !b.alive) {
      for (const ch of balls) {
        if (ch.role === 'challenger' && ch.alive && ch.challengeTarget === b) {
          ch.gainHp(50);
          spawnShockwave(ch.x, ch.y, 70, ch.color);
          spawnParticles(ch.x, ch.y, ch.color, 18);
          triggerShake(5);
        }
      }
    }
  }

  // Web lifetime + web collision
  for (let wi = webs.length-1; wi >= 0; wi--) {
    const w = webs[wi];
    w.life -= dt;
    if (w.life <= 0) { webs.splice(wi, 1); continue; }
    for (const b of aliveBalls) {
      if (b === w.owner) continue;
      if (Math.hypot(b.x - w.x, b.y - w.y) < b.radius + 14) {
        b.slowTimer = Math.max(b.slowTimer || 0, 2500);
        spawnParticles(w.x, w.y, '#aaccff', 8);
        spawnShockwave(w.x, w.y, 28, '#aaccff');
        webs.splice(wi, 1);
        break;
      }
    }
  }

  // All-pairs ball collision
  const alive2 = balls.filter(b => b.alive);
  for (let i = 0; i < alive2.length; i++) {
    for (let j = i+1; j < alive2.length; j++) {
      const a = alive2[i], b = alive2[j];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (dist < a.radius + b.radius) {
        resolveCollision(a, b);
        if (a.colCooldown <= 0 && b.colCooldown <= 0) {
          const dmgAtoB = a.role === 'berserker' ? 10 + Math.floor((1 - a.hp/a.maxHp)*20) : a.colDmg;
          const dmgBtoA = b.role === 'berserker' ? 10 + Math.floor((1 - b.hp/b.maxHp)*20) : b.colDmg;
          a.takeDamage(dmgBtoA); b.takeDamage(dmgAtoB);
          if (a.role === 'vampire' && a.alive) a.gainHp(8);
          if (b.role === 'vampire' && b.alive) b.gainHp(8);
          a.colCooldown = 600; b.colCooldown = 600;
          const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
          spawnParticles(mx, my, '#fff', 10);
          const bigHit = a.role==='tank'||b.role==='tank'||a.role==='troll'||b.role==='troll';
          spawnShockwave(mx, my, bigHit ? 72 : 50);
          triggerShake(bigHit ? 8 : 3);
        }
      }
    }
  }

  // Wukong clone hits
  for (const wu of balls) {
    if (wu.role !== 'wukong') continue;
    const opponents = balls.filter(b => b.alive && b !== wu);
    for (const opp of opponents) {
      for (let i = wu.clones.length - 1; i >= 0; i--) {
        const c = wu.clones[i];
        if (Math.hypot(opp.x - c.x, opp.y - c.y) < opp.radius + wu.radius) {
          opp.takeDamage(5);
          spawnParticles(c.x, c.y, wu.color, 8);
          spawnShockwave(c.x, c.y, 35, wu.color);
          wu.clones.splice(i, 1);
        }
      }
    }
  }

  // ── DRAW ──
  shakeAmount *= 0.82;
  const sx = (Math.random()-0.5)*shakeAmount, sy = (Math.random()-0.5)*shakeAmount;
  ctx.clearRect(0, 0, W, H);
  ctx.save(); ctx.translate(sx, sy);

  // Webs (underneath balls)
  for (const w of webs) drawWeb(ctx, w);

  // Balls
  for (const b of balls) b.draw(ctx);

  // FX
  tickParticles(dt); tickShockwaves(dt); tickDamageNumbers(dt);

  // Challenger target reticles (on top)
  for (const b of balls) {
    if (b.role !== 'challenger' || !b.alive || !b.challengeTarget?.alive) continue;
    const t = b.challengeTarget;
    const pulse = 0.5 + 0.5 * Math.abs(Math.sin(Date.now()/240));
    const tr = t.radius + 13;
    ctx.save();
    ctx.globalAlpha = pulse * 0.85;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(t.x, t.y, tr, 0, Math.PI*2); ctx.stroke();
    for (let i = 0; i < 4; i++) {
      const a = (i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(t.x + Math.cos(a)*tr, t.y + Math.sin(a)*tr);
      ctx.lineTo(t.x + Math.cos(a)*(tr+8), t.y + Math.sin(a)*(tr+8));
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();

  // Game over check
  const stillAlive = balls.filter(b => b.alive);
  if (stillAlive.length <= 1) {
    state = 'ending';
    setTimeout(() => showGameOver(stillAlive[0] || null), 400);
    return;
  }

  requestAnimationFrame(gameLoop);
}
</script>
