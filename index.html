<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ball Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ── SELECTION SCREEN ── */
    #select-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #select-screen h1 {
      font-size: 2rem;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    #select-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .player-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .player-title {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 3px;
    }
    .player-title.red    { color: #e74c3c; }
    .player-title.blue   { color: #3498db; }
    .player-title.green  { color: #2ecc71; }
    .player-title.orange { color: #f39c12; }

    .role-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .role-card {
      width: 148px;
      background: #1c1c1c;
      border: 2px solid #2e2e2e;
      border-radius: 7px;
      padding: 8px 11px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
    }
    .role-card:hover { background: #262626; border-color: #444; }
    .role-card.sel-red    { border-color: #e74c3c; background: #2a1212; }
    .role-card.sel-blue   { border-color: #3498db; background: #0e1e2c; }
    .role-card.sel-green  { border-color: #2ecc71; background: #0e2a1a; }
    .role-card.sel-orange { border-color: #f39c12; background: #2a1e08; }

    .role-name { font-size: 0.85rem; font-weight: bold; margin-bottom: 3px; }
    .role-desc { font-size: 0.62rem; color: #777; line-height: 1.35; }

    .vs-divider {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2a2a2a;
      align-self: center;
      padding: 0 2px;
    }

    #start-btn {
      padding: 12px 36px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 2px;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      background: #e74c3c;
      color: #fff;
      transition: opacity 0.15s, transform 0.1s;
    }
    #start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #start-btn:not(:disabled):hover { transform: scale(1.04); }

    /* ── GAME SCREEN ── */
    #game-screen { display: none; }
    #game-wrapper { position: relative; }

    canvas {
      display: block;
      border: 2px solid #2a2a2a;
      background: #111;
    }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.78);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    #overlay.visible { display: flex; }

    #winner-text { font-size: 2.4rem; font-weight: bold; letter-spacing: 2px; }

    .o-btn {
      padding: 10px 26px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 1px;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      background: #eee;
      color: #111;
    }
    .o-btn:hover { background: #fff; }
  </style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="select-screen">
  <h1>Ball Battle</h1>
  <div id="select-row">
    <div class="player-section">
      <div class="player-title red">RED</div>
      <div class="role-grid" id="grid-red"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title blue">BLUE</div>
      <div class="role-grid" id="grid-blue"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title green">GREEN</div>
      <div class="role-grid" id="grid-green"></div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-section">
      <div class="player-title orange">ORANGE</div>
      <div class="role-grid" id="grid-orange"></div>
    </div>
  </div>
  <button id="start-btn" disabled>SELECT ALL 4 ROLES TO FIGHT</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="860" height="480"></canvas>
    <div id="overlay">
      <div id="winner-text"></div>
      <button class="o-btn" id="play-again">PLAY AGAIN</button>
      <button class="o-btn" id="change-roles">CHANGE ROLES</button>
    </div>
  </div>
</div>

<script>
// ── ROLE DEFINITIONS ──
const ROLES = [
  { id: 'normal',    name: 'Normal',    desc: '110 HP. No ability — rewarded with extra health.' },
  { id: 'shadow',    name: 'Shadow',    desc: '90 HP. Phases invisible & invincible for 1.5s every 6s.' },
  { id: 'wukong',    name: 'Wukong',    desc: '110 HP. Spawns 3 damage-dealing clones. HP hidden while active.' },
  { id: 'death',     name: 'Death',     desc: '120 HP. Drains 3 HP every 0.6s from opponents within 80px.' },
  { id: 'laser',     name: 'Laser',     desc: '85 HP. Fires a cross beam every 4s for 25 damage.' },
  { id: 'tank',      name: 'Tank',      desc: '140 HP. Deals 18 collision damage. Large hitbox.' },
  { id: 'ghost',     name: 'Ghost',     desc: '90 HP. Passes through walls — unpredictable movement.' },
  { id: 'vampire',   name: 'Vampire',   desc: '100 HP. Heals 8 HP from every collision hit.' },
  { id: 'bomb',      name: 'Bomb',      desc: '105 HP. Explodes every 5s — 30 damage within 80px.' },
  { id: 'berserker', name: 'Berserker', desc: '90 HP. Collision damage rises from 10 to 30 as HP falls.' },
];

const ROLE_CFG = {
  normal:    { hp: 110, radius: 20, colDmg: 10 },
  shadow:    { hp: 90,  radius: 20, colDmg: 10 },
  wukong:    { hp: 110, radius: 20, colDmg: 10 },
  death:     { hp: 120, radius: 20, colDmg: 10 },
  laser:     { hp: 85,  radius: 18, colDmg: 10 },
  tank:      { hp: 140, radius: 26, colDmg: 18 },
  ghost:     { hp: 90,  radius: 20, colDmg: 10 },
  vampire:   { hp: 100, radius: 20, colDmg: 10 },
  bomb:      { hp: 105, radius: 20, colDmg: 10 },
  berserker: { hp: 90,  radius: 20, colDmg: 10 },
};

const PLAYERS = [
  { id: 'red',    color: '#e74c3c', label: 'RED'    },
  { id: 'blue',   color: '#3498db', label: 'BLUE'   },
  { id: 'green',  color: '#2ecc71', label: 'GREEN'  },
  { id: 'orange', color: '#f39c12', label: 'ORANGE' },
];

const SPEED = 3.5;

// ── SELECTION UI ──
const chosen = { red: null, blue: null, green: null, orange: null };

function buildGrid(pid) {
  const grid = document.getElementById('grid-' + pid);
  ROLES.forEach(r => {
    const card = document.createElement('div');
    card.className = 'role-card';
    card.dataset.role = r.id;
    card.innerHTML = `<div class="role-name">${r.name}</div><div class="role-desc">${r.desc}</div>`;
    card.addEventListener('click', () => {
      chosen[pid] = r.id;
      grid.querySelectorAll('.role-card').forEach(c => c.classList.remove('sel-' + pid));
      card.classList.add('sel-' + pid);
      const btn = document.getElementById('start-btn');
      if (PLAYERS.every(p => chosen[p.id])) { btn.disabled = false; btn.textContent = 'FIGHT!'; }
    });
    grid.appendChild(card);
  });
}
PLAYERS.forEach(p => buildGrid(p.id));

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('visible');
  balls.forEach(b => b.reset());
  particles.length = 0; shockwaves.length = 0; damageNumbers.length = 0; shakeAmount = 0;
  state = 'playing'; lastTime = 0;
  requestAnimationFrame(gameLoop);
});
document.getElementById('change-roles').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  PLAYERS.forEach(p => { chosen[p.id] = null; });
  document.querySelectorAll('.role-card').forEach(c =>
    c.classList.remove('sel-red','sel-blue','sel-green','sel-orange'));
  const btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = 'SELECT ALL 4 ROLES TO FIGHT';
});

// ── CANVAS ──
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function randVel() {
  const a = Math.random() * Math.PI * 2;
  return [Math.cos(a) * SPEED, Math.sin(a) * SPEED];
}

// ── BALL CLASS ──
class Ball {
  constructor(sx, sy, color, name, role) {
    this.startX = sx; this.startY = sy;
    this.color = color; this.name = name; this.role = role;
    const c = ROLE_CFG[role];
    this.maxHp = c.hp; this.radius = c.radius; this.colDmg = c.colDmg;
    this.reset();
  }

  reset() {
    this.x = this.startX; this.y = this.startY;
    [this.vx, this.vy] = randVel();
    this.hp = this.maxHp;
    this.alive = true; this.dying = false; this.dyingTimer = 0;
    this.scale = 1; this.hitFlash = 0; this.healFlash = 0; this.colCooldown = 0;
    this.trail = [];
    // ability timers
    this.shadowCycle  = 2500;  this.phased = false;
    this.cloneTimer   = 3500;  this.clones = [];
    this.auraTimer    = 600;
    this.laserTimer   = 3000;  this.laserActive = false;
    this.laserDur     = 0;     this.laserX = 0; this.laserY = 0; this.laserHitCD = 0;
    this.bombTimer    = 5000;  this.bombWarning = false;
    this.bombWarnTimer = 0;    this.bombExploding = false; this.bombExplodeDur = 0;
  }

  takeDamage(amount) {
    if (!this.alive) return;
    if (this.role === 'shadow' && this.phased) return;
    this.hp = Math.max(0, this.hp - amount);
    this.hitFlash = 1.0;
    spawnDamageNumber(this.x + (Math.random()-0.5)*20, this.y - this.radius - 6, `-${amount}`, '#ff7070');
    if (this.hp === 0) {
      this.alive = false;
      this.dying = true;
      this.dyingTimer = 350;
      spawnParticles(this.x, this.y, this.color, 20);
      spawnShockwave(this.x, this.y, 80, this.color);
      triggerShake(10);
    }
  }

  gainHp(amount) {
    if (!this.alive) return;
    this.hp = Math.min(this.maxHp, this.hp + amount);
    this.healFlash = 1.0;
    spawnDamageNumber(this.x + (Math.random()-0.5)*20, this.y - this.radius - 6, `+${amount}`, '#55ee88');
  }

  update(others, dt) {
    // Dying animation (ball shrinks out)
    if (!this.alive) {
      if (this.dying) {
        this.dyingTimer -= dt;
        this.scale = Math.max(0, this.dyingTimer / 350);
        if (this.dyingTimer <= 0) this.dying = false;
      }
      return;
    }

    // Record trail
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.pop();

    if (this.hitFlash  > 0) this.hitFlash  = Math.max(0, this.hitFlash  - dt / 220);
    if (this.healFlash > 0) this.healFlash = Math.max(0, this.healFlash - dt / 300);
    if (this.colCooldown > 0) this.colCooldown -= dt;

    // Berserker sparks at low HP
    if (this.role === 'berserker' && this.hp < this.maxHp * 0.5 && Math.random() < 0.08)
      spawnParticles(this.x + (Math.random()-0.5)*this.radius, this.y + (Math.random()-0.5)*this.radius, '#ff4400', 1);

    // Shadow
    if (this.role === 'shadow') {
      this.shadowCycle = (this.shadowCycle + dt) % 6000;
      this.phased = this.shadowCycle < 1500;
    }

    // Wukong clones
    if (this.role === 'wukong') {
      this.cloneTimer -= dt;
      if (this.cloneTimer <= 0) {
        for (let i = 0; i < 3; i++) {
          const a = Math.random() * Math.PI * 2;
          this.clones.push({ x: this.x, y: this.y, vx: Math.cos(a)*SPEED, vy: Math.sin(a)*SPEED, life: 4000 });
        }
        this.cloneTimer = 4000;
      }
      for (let i = this.clones.length - 1; i >= 0; i--) {
        const c = this.clones[i];
        c.x += c.vx; c.y += c.vy;
        if (c.x - this.radius < 0)      { c.x = this.radius;     c.vx =  Math.abs(c.vx); }
        else if (c.x + this.radius > W)  { c.x = W-this.radius;   c.vx = -Math.abs(c.vx); }
        if (c.y - this.radius < 0)      { c.y = this.radius;     c.vy =  Math.abs(c.vy); }
        else if (c.y + this.radius > H)  { c.y = H-this.radius;   c.vy = -Math.abs(c.vy); }
        c.life -= dt;
        if (c.life <= 0) this.clones.splice(i, 1);
      }
    }

    // Death aura — drains ALL nearby opponents
    if (this.role === 'death') {
      this.auraTimer -= dt;
      if (this.auraTimer <= 0) {
        for (const o of others)
          if (Math.hypot(o.x - this.x, o.y - this.y) < 80) o.takeDamage(3);
        this.auraTimer = 600;
      }
    }

    // Laser
    if (this.role === 'laser') {
      if (this.laserHitCD > 0) this.laserHitCD -= dt;
      this.laserTimer -= dt;
      if (this.laserTimer <= 0) {
        this.laserActive = true; this.laserDur = 2000;
        this.laserX = this.x; this.laserY = this.y;
        this.laserTimer = 4000; this.laserHitCD = 0;
      }
      if (this.laserActive) {
        this.laserDur -= dt;
        if (this.laserDur <= 0) { this.laserActive = false; }
        else if (this.laserHitCD <= 0) {
          for (const o of others) {
            const hitH = Math.abs(o.y - this.laserY) <= o.radius + 3;
            const hitV = Math.abs(o.x - this.laserX) <= o.radius + 3;
            if (hitH || hitV) {
              o.takeDamage(25);
              spawnShockwave(o.x, o.y, 45, '#ffa500');
              triggerShake(5);
              this.laserHitCD = 700;
              break;
            }
          }
        }
      }
    }

    // Bomb
    if (this.role === 'bomb') {
      this.bombTimer -= dt;
      if (this.bombTimer <= 0 && !this.bombWarning) {
        this.bombWarning = true; this.bombWarnTimer = 600;
      }
      if (this.bombWarning) {
        this.bombWarnTimer -= dt;
        if (this.bombWarnTimer <= 0) {
          this.bombWarning = false; this.bombTimer = 5000;
          this.bombExploding = true; this.bombExplodeDur = 350;
          spawnParticles(this.x, this.y, '#ff6600', 18);
          spawnShockwave(this.x, this.y, 90, '#ff8800');
          triggerShake(12);
          for (const o of others)
            if (Math.hypot(o.x - this.x, o.y - this.y) < 80) o.takeDamage(30);
        }
      }
      if (this.bombExploding) {
        this.bombExplodeDur -= dt;
        if (this.bombExplodeDur <= 0) this.bombExploding = false;
      }
    }

    // Move
    this.x += this.vx; this.y += this.vy;
    if (this.role === 'ghost') {
      if (this.x + this.radius < 0)     this.x = W + this.radius;
      else if (this.x - this.radius > W) this.x = -this.radius;
      if (this.y + this.radius < 0)     this.y = H + this.radius;
      else if (this.y - this.radius > H) this.y = -this.radius;
    } else {
      if (this.x - this.radius < 0)      { this.x = this.radius;   this.vx =  Math.abs(this.vx); spawnParticles(this.x, this.y, this.color, 4); }
      else if (this.x + this.radius > W)  { this.x = W-this.radius; this.vx = -Math.abs(this.vx); spawnParticles(this.x, this.y, this.color, 4); }
      if (this.y - this.radius < 0)      { this.y = this.radius;   this.vy =  Math.abs(this.vy); spawnParticles(this.x, this.y, this.color, 4); }
      else if (this.y + this.radius > H)  { this.y = H-this.radius; this.vy = -Math.abs(this.vy); spawnParticles(this.x, this.y, this.color, 4); }
    }

    // Constant speed
    const spd = Math.hypot(this.vx, this.vy);
    if (spd > 0) { this.vx = (this.vx/spd)*SPEED; this.vy = (this.vy/spd)*SPEED; }
  }

  draw(ctx) {
    if (!this.alive && !this.dying) return;
    if (this.scale <= 0) return;
    const r = this.radius * this.scale;

    // Bomb warning/explosion
    if (this.role === 'bomb') {
      if (this.bombWarning) {
        const t = 1 - this.bombWarnTimer / 600;
        ctx.save();
        ctx.strokeStyle = `rgba(255,100,0,${0.4 + t*0.55})`; ctx.lineWidth = 2 + t*2;
        ctx.beginPath(); ctx.arc(this.x, this.y, 40 + t*40, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
      if (this.bombExploding) {
        const t = 1 - this.bombExplodeDur / 350;
        ctx.save();
        ctx.globalAlpha = (1-t) * 0.65;
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.arc(this.x, this.y, 20 + t*80, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // Death aura
    if (this.role === 'death') {
      const pulse = 0.07 + 0.04 * Math.sin(Date.now() / 350);
      ctx.save(); ctx.globalAlpha = pulse;
      ctx.fillStyle = '#7b00a0';
      ctx.beginPath(); ctx.arc(this.x, this.y, 80, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Laser beam
    if (this.role === 'laser' && this.laserActive) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, this.laserDur / 400);
      ctx.strokeStyle = '#ffa500'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, this.laserY); ctx.lineTo(W, this.laserY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(this.laserX, 0); ctx.lineTo(this.laserX, H); ctx.stroke();
      ctx.restore();
    }

    // Wukong clones
    if (this.role === 'wukong') {
      for (const c of this.clones) {
        ctx.save();
        ctx.globalAlpha = (c.life / 4000) * 0.45;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(c.x, c.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // Trail
    for (let i = this.trail.length - 1; i >= 0; i--) {
      const t = this.trail[i];
      const frac = (this.trail.length - i) / this.trail.length;
      ctx.save();
      ctx.globalAlpha = frac * 0.28;
      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, r * frac * 0.7, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Low-HP pulse ring
    if (this.hp > 0 && this.hp < this.maxHp * 0.3) {
      const pulse = 0.3 + 0.3 * Math.abs(Math.sin(Date.now() / 220));
      ctx.save(); ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(this.x, this.y, r + 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Main ball
    ctx.save();
    if (this.role === 'shadow' && this.phased) ctx.globalAlpha = 0.22;
    else if (this.role === 'ghost') ctx.globalAlpha = 0.65;

    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();

    if (this.role === 'berserker') {
      const rage = 1 - this.hp / this.maxHp;
      if (rage > 0.05) {
        ctx.fillStyle = `rgba(255,30,0,${rage * 0.55})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
      }
    }
    if (this.hitFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.hitFlash * 0.75})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }
    if (this.healFlash > 0) {
      ctx.fillStyle = `rgba(60,255,120,${this.healFlash * 0.6})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
    }

    // HP number (hidden during Wukong clones)
    const hideHp = this.role === 'wukong' && this.clones.length > 0;
    if (!hideHp && this.alive) {
      const fontSize = Math.max(10, Math.floor(r * 0.58));
      ctx.globalAlpha = 1;
      ctx.fillStyle = this.hp > this.maxHp * 0.3 ? '#fff' : '#ff8080';
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(this.hp, this.x, this.y);
    }
    ctx.restore();
  }
}

// ── ELASTIC COLLISION ──
function resolveCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx, dy) || 1;
  const overlap = (a.radius + b.radius) - dist;
  if (overlap > 0) {
    const nx = dx/dist, ny = dy/dist;
    a.x -= nx*overlap/2; a.y -= ny*overlap/2;
    b.x += nx*overlap/2; b.y += ny*overlap/2;
  }
  const nx = dx/dist, ny = dy/dist;
  const dot = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
  if (dot <= 0) return;
  a.vx -= dot*nx; a.vy -= dot*ny;
  b.vx += dot*nx; b.vy += dot*ny;
}

// ── PARTICLES ──
const particles = [];
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*3;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color });
  }
}
function tickParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9;
    p.life -= dt/500;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = p.life * 0.8; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── SHOCKWAVES ──
const shockwaves = [];
function spawnShockwave(x, y, maxR = 55, color = '#fff') {
  shockwaves.push({ x, y, r: 4, maxR, life: 1, color });
}
function tickShockwaves(dt) {
  for (let i = shockwaves.length-1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += (s.maxR - s.r) * 0.18;
    s.life -= dt / 350;
    if (s.life <= 0) { shockwaves.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = s.life * 0.5;
    ctx.strokeStyle = s.color; ctx.lineWidth = s.life * 2.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ── DAMAGE NUMBERS ──
const damageNumbers = [];
function spawnDamageNumber(x, y, text, color) {
  damageNumbers.push({ x, y, text, color, life: 1, vy: -1.2 });
}
function tickDamageNumbers(dt) {
  for (let i = damageNumbers.length-1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy; d.vy *= 0.96; d.life -= dt / 750;
    if (d.life <= 0) { damageNumbers.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color; ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(d.text, d.x, d.y);
    ctx.restore();
  }
}

// ── SCREEN SHAKE ──
let shakeAmount = 0;
function triggerShake(amount) { shakeAmount = Math.max(shakeAmount, amount); }

// ── GAME STATE ──
let balls = [], state, lastTime;

function startGame() {
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'block';

  const starts = [
    [180, 120], [680, 120], [180, 360], [680, 360]
  ];
  balls = PLAYERS.map((p, i) =>
    new Ball(starts[i][0], starts[i][1], p.color, p.label, chosen[p.id])
  );

  particles.length = 0; shockwaves.length = 0; damageNumbers.length = 0; shakeAmount = 0;
  state = 'playing'; lastTime = 0;
  requestAnimationFrame(gameLoop);
}

function showGameOver(winner) {
  const el = document.getElementById('winner-text');
  if (winner) { el.textContent = winner.name + ' WINS!'; el.style.color = winner.color; }
  else        { el.textContent = 'DRAW!';                el.style.color = '#fff'; }
  document.getElementById('overlay').classList.add('visible');
  state = 'gameover';
}

// ── GAME LOOP ──
function gameLoop(ts) {
  if (state !== 'playing') return;
  const dt = lastTime ? ts - lastTime : 16;
  lastTime = ts;

  const aliveBalls = balls.filter(b => b.alive);

  // Update all balls (dying balls handle their own shrink animation)
  for (const b of balls) {
    b.update(aliveBalls.filter(o => o !== b), dt);
  }

  // All-pairs collision
  for (let i = 0; i < aliveBalls.length; i++) {
    for (let j = i+1; j < aliveBalls.length; j++) {
      const a = aliveBalls[i], b = aliveBalls[j];
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      if (dist < a.radius + b.radius) {
        resolveCollision(a, b);
        if (a.colCooldown <= 0 && b.colCooldown <= 0) {
          const dmgAtoB = a.role === 'berserker' ? 10 + Math.floor((1 - a.hp/a.maxHp)*20) : a.colDmg;
          const dmgBtoA = b.role === 'berserker' ? 10 + Math.floor((1 - b.hp/b.maxHp)*20) : b.colDmg;
          a.takeDamage(dmgBtoA); b.takeDamage(dmgAtoB);
          if (a.role === 'vampire' && a.alive) a.gainHp(8);
          if (b.role === 'vampire' && b.alive) b.gainHp(8);
          a.colCooldown = 600; b.colCooldown = 600;
          const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
          spawnParticles(mx, my, '#fff', 10);
          spawnShockwave(mx, my, a.role==='tank'||b.role==='tank' ? 70 : 50);
          triggerShake(a.role==='tank'||b.role==='tank' ? 7 : 3);
        }
      }
    }
  }

  // Wukong clones hit any alive opponent
  for (const wu of balls) {
    if (wu.role !== 'wukong') continue;
    for (const opp of aliveBalls.filter(o => o !== wu)) {
      for (let i = wu.clones.length - 1; i >= 0; i--) {
        const c = wu.clones[i];
        if (Math.hypot(opp.x - c.x, opp.y - c.y) < opp.radius + wu.radius) {
          opp.takeDamage(5);
          spawnParticles(c.x, c.y, wu.color, 8);
          spawnShockwave(c.x, c.y, 35, wu.color);
          wu.clones.splice(i, 1);
        }
      }
    }
  }

  // Draw
  shakeAmount *= 0.82;
  const sx = (Math.random()-0.5)*shakeAmount, sy = (Math.random()-0.5)*shakeAmount;
  ctx.clearRect(0, 0, W, H);
  ctx.save(); ctx.translate(sx, sy);
  for (const b of balls) b.draw(ctx);
  tickParticles(dt); tickShockwaves(dt); tickDamageNumbers(dt);
  ctx.restore();

  // Game over: only 1 (or 0) alive
  const stillAlive = balls.filter(b => b.alive);
  if (stillAlive.length <= 1) {
    state = 'ending';
    // Wait for dying animations to finish then show overlay
    setTimeout(() => showGameOver(stillAlive[0] || null), 400);
    return;
  }

  requestAnimationFrame(gameLoop);
}
</script>
