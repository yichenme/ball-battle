<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ball Battle</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#111;font-family:'Segoe UI',sans-serif;color:#fff;overflow:hidden;width:100vw;height:100vh;touch-action:none;}

    /* ── LOBBY ── */
    #lobby{display:flex;flex-direction:column;align-items:center;gap:18px;padding:20px;width:100vw;min-height:100vh;justify-content:center;overflow-y:auto;}
    #lobby h1{font-size:2rem;letter-spacing:5px;text-transform:uppercase;}
    #conn-status{font-size:0.75rem;color:#555;letter-spacing:2px;}
    #conn-status.ok{color:#2ecc71;}
    #my-slot{font-size:0.9rem;letter-spacing:2px;padding:5px 14px;border-radius:12px;background:#1a1a1a;}
    #select-row{display:flex;align-items:flex-start;gap:10px;}
    .player-section{display:flex;flex-direction:column;align-items:center;gap:7px;}
    .player-title{font-size:0.85rem;font-weight:bold;letter-spacing:3px;}
    .player-title.red{color:#e74c3c;} .player-title.blue{color:#3498db;}
    .player-title.green{color:#2ecc71;} .player-title.orange{color:#f39c12;}
    .player-status{font-size:0.58rem;color:#555;letter-spacing:1px;height:14px;}
    .role-grid{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 220px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #1a1a1a;padding-right:2px;}
    .role-grid::-webkit-scrollbar{width:4px;} .role-grid::-webkit-scrollbar-track{background:#1a1a1a;} .role-grid::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
    .role-card{width:138px;background:#1c1c1c;border:2px solid #2e2e2e;border-radius:7px;padding:5px 9px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;}
    .role-card:hover{background:#262626;border-color:#444;}
    .role-card.sel-red{border-color:#e74c3c;background:#2a1212;} .role-card.sel-blue{border-color:#3498db;background:#0e1e2c;}
    .role-card.sel-green{border-color:#2ecc71;background:#0e2a1a;} .role-card.sel-orange{border-color:#f39c12;background:#2a1e08;}
    .role-card.other-taken{opacity:0.45;pointer-events:none;}
    .role-name{font-size:0.80rem;font-weight:bold;margin-bottom:2px;}
    .role-desc{font-size:0.56rem;color:#777;line-height:1.35;}
    .vs-divider{font-size:1.1rem;font-weight:bold;color:#2a2a2a;align-self:center;padding:0 2px;}
    #start-btn{padding:11px 34px;font-size:0.88rem;font-weight:bold;letter-spacing:2px;border:none;border-radius:28px;cursor:pointer;background:#e74c3c;color:#fff;transition:opacity .15s,transform .1s;}
    #start-btn:disabled{opacity:.3;cursor:not-allowed;}
    #start-btn:not(:disabled):hover{transform:scale(1.04);}
    #lobby-hint{font-size:0.65rem;color:#444;letter-spacing:1px;}

    /* ── GAME ── */
    #game{display:none;position:fixed;inset:0;}
    canvas{display:block;width:100%;height:100%;background:#111;}

    /* Speed + controls */
    #hud{position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;z-index:20;}
    #speed-label{font-size:0.62rem;color:#555;letter-spacing:1px;}
    .sp-btn{padding:3px 10px;font-size:0.70rem;font-weight:bold;border:1.5px solid #444;border-radius:12px;background:rgba(0,0,0,.6);color:#888;cursor:pointer;transition:all .12s;user-select:none;}
    .sp-btn.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.10);}
    .sp-btn:hover:not(.active){border-color:#888;color:#ccc;}

    /* You label */
    #you-label{position:absolute;top:10px;left:10px;font-size:0.7rem;letter-spacing:2px;color:#555;z-index:20;}

    /* WASD hint */
    #wasd-hint{position:absolute;bottom:10px;left:10px;font-size:0.62rem;color:#333;z-index:20;line-height:1.7;}

    /* Joystick */
    #joystick-zone{position:absolute;bottom:20px;left:20px;width:120px;height:120px;z-index:20;display:none;}
    #joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);position:absolute;}
    #joystick-knob{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.25);position:absolute;top:36px;left:36px;pointer-events:none;}

    /* Overlay (game over) */
    #overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.82);flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10;}
    #overlay.vis{display:flex;}
    #winner-text{font-size:2.6rem;font-weight:bold;letter-spacing:2px;}
    .o-btn{padding:10px 28px;font-size:.9rem;font-weight:bold;letter-spacing:1px;border:none;border-radius:22px;cursor:pointer;background:#eee;color:#111;}
    .o-btn:hover{background:#fff;}
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Ball Battle</h1>
  <div id="conn-status">CONNECTING…</div>
  <div id="my-slot">Waiting for slot…</div>
  <div id="select-row">
    <div class="player-section"><div class="player-title red">RED</div><div class="player-status" id="st-red"></div><div class="role-grid" id="grid-red"></div></div>
    <div class="vs-divider">VS</div>
    <div class="player-section"><div class="player-title blue">BLUE</div><div class="player-status" id="st-blue"></div><div class="role-grid" id="grid-blue"></div></div>
    <div class="vs-divider">VS</div>
    <div class="player-section"><div class="player-title green">GREEN</div><div class="player-status" id="st-green"></div><div class="role-grid" id="grid-green"></div></div>
    <div class="vs-divider">VS</div>
    <div class="player-section"><div class="player-title orange">ORANGE</div><div class="player-status" id="st-orange"></div><div class="role-grid" id="grid-orange"></div></div>
  </div>
  <button id="start-btn" disabled>PICK A ROLE TO START</button>
  <div id="lobby-hint">Empty slots become bots • WASD / joystick to steer your ball</div>
</div>

<!-- GAME -->
<div id="game">
  <canvas id="cv"></canvas>
  <div id="you-label"></div>
  <div id="hud">
    <span id="speed-label">SPEED</span>
    <button class="sp-btn" data-s="0.5">½×</button>
    <button class="sp-btn active" data-s="1">1×</button>
    <button class="sp-btn" data-s="2">2×</button>
    <button class="sp-btn" data-s="3">3×</button>
  </div>
  <div id="wasd-hint">WASD / ↑↓←→ to steer</div>
  <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-knob"></div></div>
  <div id="overlay">
    <div id="winner-text"></div>
    <button class="o-btn" id="play-again">PLAY AGAIN</button>
    <button class="o-btn" id="back-lobby">CHANGE ROLES</button>
  </div>
</div>

<script>
// ── ROLES (for lobby UI) ──────────────────────────────────────────────────────
const ROLES = [
  {id:'normal',    name:'Normal',     desc:'110 HP. No ability — extra health.'},
  {id:'shadow',    name:'Shadow',     desc:'90 HP. Invincible & invisible 1.5s / 6s.'},
  {id:'wukong',    name:'Wukong',     desc:'110 HP. Clones itself every second.'},
  {id:'death',     name:'Death',      desc:'120 HP. Drains 3 HP/0.6s within 80px.'},
  {id:'laser',     name:'Laser',      desc:'85 HP. Charges then fires glowing cross beam.'},
  {id:'tank',      name:'Tank',       desc:'140 HP. 18 col. dmg. Large hitbox.'},
  {id:'ghost',     name:'Ghost',      desc:'90 HP. Passes through walls.'},
  {id:'vampire',   name:'Vampire',    desc:'100 HP. Heals 8 HP per collision.'},
  {id:'bomb',      name:'Bomb',       desc:'105 HP. Explodes every 5s — 30 dmg.'},
  {id:'berserker', name:'Berserker',  desc:'90 HP. Damage 10→30 as HP falls.'},
  {id:'zatan',     name:'Zatan',      desc:'100 HP. Homing souls + teleport to enemies.'},
  {id:'mummy',     name:'Mummy 木乃伊', desc:'115 HP. Shield every 7s. Regens 1 HP/s.'},
  {id:'troll',     name:'Troll',      desc:'165 HP. Slow. Regens 3 HP/0.8s.'},
  {id:'dragon',    name:'Dragon',     desc:'105 HP. Fire breath cone + burn DOT.'},
  {id:'challenger',name:'Challenger', desc:'95 HP. Rushes strongest foe. Kill = +50 HP.'},
  {id:'spider',    name:'Spider',     desc:'82 HP. Fast. Leaves sticky web trail.'},
];

const PLAYER_DEFS = [
  {id:'red',color:'#e74c3c',label:'RED'},
  {id:'blue',color:'#3498db',label:'BLUE'},
  {id:'green',color:'#2ecc71',label:'GREEN'},
  {id:'orange',color:'#f39c12',label:'ORANGE'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let mySlotId = null;
let myRole   = null;
let WS_W = 1280, WS_H = 720;  // server world size (set on welcome)
let serverState  = null;
let particles    = [];
let shockwaves   = [];
let damageNumbers = [];
let shakeAmt     = 0;
let inputDx = 0, inputDy = 0;
let lastInputSent = { dx:0, dy:0 };

// ── CANVAS ────────────────────────────────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
function resizeCanvas() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── WEBSOCKET ─────────────────────────────────────────────────────────────────
const wsUrl = `ws://${location.host}`;
let ws;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.addEventListener('open', () => {
    document.getElementById('conn-status').textContent = 'CONNECTED';
    document.getElementById('conn-status').className = 'ok';
  });
  ws.addEventListener('close', () => {
    document.getElementById('conn-status').textContent = 'DISCONNECTED — reload to reconnect';
    document.getElementById('conn-status').className = '';
    setTimeout(connect, 2000);
  });
  ws.addEventListener('message', e => handleMessage(JSON.parse(e.data)));
}
connect();

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

// ── MESSAGE HANDLER ────────────────────────────────────────────────────────────
function handleMessage(msg) {
  if (msg.type === 'welcome') {
    mySlotId = msg.slotId;
    WS_W = msg.W || 1280; WS_H = msg.H || 720;
    const p = PLAYER_DEFS.find(p=>p.id===mySlotId);
    const el = document.getElementById('my-slot');
    el.textContent = `You are ${p.label}`;
    el.style.color = p.color;
    el.style.borderColor = p.color;

  } else if (msg.type === 'lobby') {
    updateLobbyUI(msg.slots);

  } else if (msg.type === 'start') {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display  = 'block';
    // show joystick on touch device
    if (navigator.maxTouchPoints > 0) {
      document.getElementById('joystick-zone').style.display = 'block';
      document.getElementById('wasd-hint').style.display = 'none';
    }
    const p = PLAYER_DEFS.find(p=>p.id===mySlotId);
    document.getElementById('you-label').textContent = `YOU: ${p.label} (${myRole||'?'})`;
    document.getElementById('you-label').style.color = p.color;
    document.getElementById('overlay').classList.remove('vis');
    particles=[]; shockwaves=[]; damageNumbers=[]; shakeAmt=0;

  } else if (msg.type === 'state') {
    serverState = msg;

  } else if (msg.type === 'fx') {
    for (const ev of msg.events) {
      if (ev.kind==='particles') spawnParticles(ev.x,ev.y,ev.color,ev.count||10);
      else if (ev.kind==='shockwave') spawnShockwave(ev.x,ev.y,ev.maxR||55,ev.color||'#fff');
      else if (ev.kind==='damage') spawnDamageNumber(ev.x,ev.y,ev.text,ev.color);
      else if (ev.kind==='shake') triggerShake(ev.amount||4);
    }

  } else if (msg.type === 'gameover') {
    const el = document.getElementById('winner-text');
    if (msg.winnerId) { el.textContent = msg.winnerName+' WINS!'; el.style.color = msg.winnerColor; }
    else { el.textContent = 'DRAW!'; el.style.color = '#fff'; }
    document.getElementById('overlay').classList.add('vis');

  } else if (msg.type === 'speedChanged') {
    document.querySelectorAll('.sp-btn').forEach(b => {
      b.classList.toggle('active', parseFloat(b.dataset.s) === msg.speed);
    });
  }
}

// ── LOBBY UI ──────────────────────────────────────────────────────────────────
function buildGrids() {
  PLAYER_DEFS.forEach(p => {
    const grid = document.getElementById('grid-'+p.id);
    ROLES.forEach(r => {
      const card = document.createElement('div');
      card.className = 'role-card';
      card.id = `card-${p.id}-${r.id}`;
      card.innerHTML = `<div class="role-name">${r.name}</div><div class="role-desc">${r.desc}</div>`;
      if (p.id === mySlotId || !mySlotId) {
        card.addEventListener('click', () => {
          if (p.id !== mySlotId) return;
          myRole = r.id;
          send({ type:'selectRole', role:r.id });
        });
      }
      grid.appendChild(card);
    });
  });
}
buildGrids();

function updateLobbyUI(slots) {
  const mySlot = slots.find(s=>s.id===mySlotId);
  const allMyReady = mySlot && mySlot.role;
  const btn = document.getElementById('start-btn');

  slots.forEach(s => {
    const st = document.getElementById('st-'+s.id);
    if (s.connected) st.textContent = s.role ? `✓ ${s.role}` : 'connected…';
    else st.textContent = 'bot slot';

    // Highlight selected role cards
    ROLES.forEach(r => {
      const card = document.getElementById(`card-${s.id}-${r.id}`);
      if (!card) return;
      PLAYER_DEFS.forEach(p2 => card.classList.remove('sel-'+p2.id));
      card.classList.remove('other-taken');
      if (s.role === r.id) card.classList.add('sel-'+s.id);
      // Grey out roles taken by other players in this column
      if (s.role && s.role !== r.id && s.id !== mySlotId) card.classList.add('other-taken');
    });
  });

  // My role cards — only my column is interactive
  PLAYER_DEFS.forEach(p => {
    ROLES.forEach(r => {
      const card = document.getElementById(`card-${p.id}-${r.id}`);
      if (!card) return;
      if (p.id !== mySlotId) card.style.pointerEvents = 'none';
    });
  });

  btn.disabled = !allMyReady;
  btn.textContent = allMyReady ? 'START BATTLE' : 'PICK A ROLE TO START';
}

document.getElementById('start-btn').addEventListener('click', () => send({type:'startGame'}));
document.getElementById('play-again').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('vis');
  send({type:'playAgain'});
});
document.getElementById('back-lobby').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('game').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  myRole = null;
  send({type:'backToLobby'});
});

// Speed buttons
document.querySelectorAll('.sp-btn').forEach(btn => {
  btn.addEventListener('click', () => send({type:'setSpeed', speed:parseFloat(btn.dataset.s)}));
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key]=true; });
window.addEventListener('keyup',   e => { keys[e.key]=false; });

function readKeys() {
  let dx=0, dy=0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx=-1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx=1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy=-1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy=1;
  if (dx && dy) { dx*=0.707; dy*=0.707; }
  return {dx,dy};
}

// Joystick
const jZone  = document.getElementById('joystick-zone');
const jKnob  = document.getElementById('joystick-knob');
let jActive = false, jOriginX=0, jOriginY=0, jDx=0, jDy=0;
const J_RADIUS = 36;

jZone.addEventListener('touchstart', e => {
  const t=e.touches[0], rect=jZone.getBoundingClientRect();
  jOriginX=t.clientX-rect.left; jOriginY=t.clientY-rect.top; jActive=true; e.preventDefault();
},{passive:false});
window.addEventListener('touchmove', e => {
  if (!jActive) return;
  const t=e.touches[0], rect=jZone.getBoundingClientRect();
  const dx=t.clientX-rect.left-jOriginX, dy=t.clientY-rect.top-jOriginY;
  const dist=Math.hypot(dx,dy), clamp=Math.min(dist,J_RADIUS);
  jDx = dist>0 ? (dx/dist)*(clamp/J_RADIUS) : 0;
  jDy = dist>0 ? (dy/dist)*(clamp/J_RADIUS) : 0;
  jKnob.style.left = (60+jDx*J_RADIUS-24)+'px';
  jKnob.style.top  = (60+jDy*J_RADIUS-24)+'px';
  e.preventDefault();
},{passive:false});
window.addEventListener('touchend', () => {
  jActive=false; jDx=0; jDy=0;
  jKnob.style.left='36px'; jKnob.style.top='36px';
});

// Send input every 40ms
setInterval(() => {
  if (!ws || ws.readyState!==1) return;
  const ki = readKeys();
  const dx = jActive ? jDx : ki.dx;
  const dy = jActive ? jDy : ki.dy;
  if (dx!==lastInputSent.dx || dy!==lastInputSent.dy) {
    send({type:'input',dx,dy});
    lastInputSent={dx,dy};
  }
}, 40);

// ── FX HELPERS ────────────────────────────────────────────────────────────────
function spawnParticles(x,y,color,count=10){
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,spd=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color});}
}
function spawnShockwave(x,y,maxR=55,color='#fff'){shockwaves.push({x,y,r:4,maxR,life:1,color});}
function spawnDamageNumber(x,y,text,color){damageNumbers.push({x,y,text,color,life:1,vy:-1.2});}
function triggerShake(amount){shakeAmt=Math.max(shakeAmt,amount);}

// ── RENDER ────────────────────────────────────────────────────────────────────
// Scale from server world to canvas
function scaleX(x){ return x * (cv.width  / WS_W); }
function scaleY(y){ return y * (cv.height / WS_H); }
function scaleR(r){ return r * Math.min(cv.width/WS_W, cv.height/WS_H); }

function drawBall(b) {
  if (!b.alive && !b.dying) return;
  if (b.scale <= 0) return;
  const bx=scaleX(b.x), by=scaleY(b.y), r=scaleR(b.radius)*b.scale;
  const now=Date.now();

  // ── ZATAN SOULS ──
  if (b.role==='zatan' && b.souls) {
    for (const s of b.souls) {
      const a=Math.min(1,s.life/500)*0.9, sx=scaleX(s.x), sy=scaleY(s.y);
      ctx.save();
      ctx.globalAlpha=a*0.22;ctx.fillStyle='#ff00aa';ctx.beginPath();ctx.arc(sx,sy,scaleR(13),0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=a*0.65;ctx.fillStyle='#9b00c4';ctx.beginPath();ctx.arc(sx,sy,scaleR(7.5),0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=a;ctx.fillStyle='#dd88ff';ctx.beginPath();ctx.arc(sx,sy,scaleR(3.5),0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // ── BOMB ──
  if (b.role==='bomb') {
    if (b.bombWarning) {
      const t=1-b.bombWarnTimer/600;
      ctx.save();ctx.strokeStyle=`rgba(255,100,0,${0.4+t*0.55})`;ctx.lineWidth=2+t*2;
      ctx.beginPath();ctx.arc(bx,by,scaleR(40+t*40),0,Math.PI*2);ctx.stroke();ctx.restore();
    }
    if (b.bombExploding) {
      const t=1-b.bombExplodeDur/350;
      ctx.save();ctx.globalAlpha=(1-t)*0.65;ctx.fillStyle='#ff6600';
      ctx.beginPath();ctx.arc(bx,by,scaleR(20+t*80),0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }

  // ── DEATH AURA ──
  if (b.role==='death') {
    const pulse=0.07+0.04*Math.sin(now/350);
    ctx.save();ctx.globalAlpha=pulse;ctx.fillStyle='#7b00a0';
    ctx.beginPath();ctx.arc(bx,by,scaleR(80),0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // ── LASER ──
  if (b.role==='laser') {
    if (b.laserCharging) {
      const t=1-b.laserChargeDur/650, lx=scaleX(b.x), ly=scaleY(b.y);
      ctx.save();
      ctx.globalAlpha=t*0.8;ctx.strokeStyle=b.color;ctx.lineWidth=2+t*4;
      ctx.beginPath();ctx.arc(lx,ly,r+scaleR(5+t*14),0,Math.PI*2);ctx.stroke();
      for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+now*0.004;ctx.globalAlpha=t*0.7;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(lx+Math.cos(a)*(r+scaleR(8+t*10)),ly+Math.sin(a)*(r+scaleR(8+t*10)),scaleR(2.5),0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
    if (b.laserActive) {
      const alpha=Math.min(1,b.laserDur/300), lx=scaleX(b.laserX), ly=scaleY(b.laserY);
      ctx.save();ctx.lineCap='square';
      const beam=(w,a2)=>{ctx.globalAlpha=alpha*a2;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(cv.width,ly);ctx.stroke();ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,cv.height);ctx.stroke();};
      ctx.strokeStyle=b.color;beam(scaleR(28),0.07);beam(scaleR(12),0.23);beam(scaleR(5),0.48);beam(scaleR(2),0.82);
      ctx.strokeStyle='#fff';beam(scaleR(0.9),0.94);
      ctx.globalAlpha=alpha*0.55;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lx,ly,scaleR(6+(1-alpha)*8),0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // ── WUKONG CLONES ──
  if (b.role==='wukong' && b.clones) {
    for (const c of b.clones) {
      const fade=Math.min(1,c.life/1200),cx2=scaleX(c.x),cy2=scaleY(c.y),cr=scaleR(b.radius)*0.88;
      ctx.save();ctx.globalAlpha=fade*0.58;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(cx2,cy2,cr,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=fade*0.28;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx2,cy2,cr,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }

  // ── DRAGON BREATH ──
  if (b.role==='dragon') {
    if (b.dragonCharging){
      const t=1-b.dragonChargeDur/600,a=b.dragonBreathAngle;
      ctx.save();ctx.globalAlpha=t*0.55;ctx.strokeStyle='#ff8800';ctx.lineWidth=2+t*3;
      ctx.beginPath();ctx.arc(bx,by,r+scaleR(5+t*10),a-Math.PI/4,a+Math.PI/4);ctx.stroke();ctx.restore();
    }
    if (b.dragonBreathing){
      const t=b.dragonBreathDur/450,a=b.dragonBreathAngle,half=Math.PI/5;
      ctx.save();
      const maxR=scaleR(135);
      const grad=ctx.createRadialGradient(bx,by,r*0.5,bx,by,maxR);
      grad.addColorStop(0,`rgba(255,220,80,${t*0.95})`);grad.addColorStop(0.3,`rgba(255,130,0,${t*0.75})`);
      grad.addColorStop(0.7,`rgba(255,60,0,${t*0.45})`);grad.addColorStop(1,`rgba(255,40,0,0)`);
      ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(bx,by);ctx.arc(bx,by,maxR,a-half,a+half);ctx.closePath();ctx.fill();ctx.restore();
    }
  }

  // ── MUMMY SHIELD ──
  if (b.role==='mummy') {
    if (b.mummyShield) {
      const pulse=0.45+0.3*Math.sin(now/160);
      ctx.save();ctx.globalAlpha=pulse;ctx.strokeStyle='#ff9cf4';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(bx,by,r+scaleR(11),0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=pulse*0.12;ctx.fillStyle='#ff9cf4';ctx.beginPath();ctx.arc(bx,by,r+scaleR(11),0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else {
      const prog=Math.min(1,b.mummyShieldTimer/7000);
      ctx.save();ctx.globalAlpha=0.28;ctx.strokeStyle='#ff9cf4';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bx,by,r+scaleR(9),-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();ctx.restore();
    }
  }

  // ── LOW-HP PULSE ──
  if (b.hp>0 && b.hp<b.maxHp*0.3) {
    const pulse=0.3+0.3*Math.abs(Math.sin(now/220));
    ctx.save();ctx.globalAlpha=pulse;ctx.strokeStyle='#ff3333';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(bx,by,r+scaleR(6),0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // ── MAIN BALL ──
  ctx.save();
  if (b.role==='shadow'&&b.phased) ctx.globalAlpha=0.22;
  else if (b.role==='ghost') ctx.globalAlpha=0.65;

  ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();

  if (b.role==='troll'){ctx.globalAlpha=(ctx.globalAlpha||1)*0.20;ctx.fillStyle='#2ecc71';ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}
  if (b.role==='zatan'){const p2=0.13+0.10*Math.sin(now/280);ctx.globalAlpha=p2;ctx.fillStyle='#7b00a0';ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}
  if (b.role==='berserker'){const rage=1-b.hp/b.maxHp;if(rage>0.05){ctx.fillStyle=`rgba(255,30,0,${rage*0.55})`;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}}
  if (b.hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${b.hitFlash*0.75})`;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}
  if (b.healFlash>0){ctx.fillStyle=`rgba(60,255,120,${b.healFlash*0.6})`;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}

  // HP label
  if (b.alive) {
    const fontSize=Math.max(9,Math.floor(r*0.56));
    ctx.globalAlpha=1;ctx.fillStyle=b.hp>b.maxHp*0.3?'#fff':'#ff8080';
    ctx.font=`bold ${fontSize}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.hp,bx,by);
  }

  // "YOU" marker
  if (b.id===mySlotId && b.alive) {
    ctx.globalAlpha=0.7;ctx.fillStyle=b.color;
    ctx.font=`bold ${Math.max(9,Math.floor(r*0.38))}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('YOU',bx,by-r-scaleR(9));
  }
  ctx.restore();

  // ── SLOW WEB OVERLAY ──
  if (b.slowTimer>0){
    const alpha=Math.min(1,b.slowTimer/500)*0.5;
    ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle='#c0ddff';ctx.lineWidth=0.9;
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(a)*r*1.1,by+Math.sin(a)*r*1.1);ctx.stroke();}
    for(let ri=1;ri<=3;ri++){ctx.beginPath();ctx.arc(bx,by,r*(ri/3),0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
  // ── BURN RING ──
  if (b.burnTimer>0){
    const pulse=0.28+0.24*Math.abs(Math.sin(now/110));
    ctx.save();ctx.globalAlpha=pulse;ctx.strokeStyle='#ff6600';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bx,by,r+scaleR(4),0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function drawWebs(webs) {
  if (!webs) return;
  for (const w of webs) {
    const alpha=(w.life/w.maxLife);
    ctx.save();
    ctx.globalAlpha=alpha*0.16;ctx.strokeStyle='#c0ddff';ctx.lineWidth=scaleR(4);
    ctx.beginPath();ctx.moveTo(scaleX(w.x1),scaleY(w.y1));ctx.lineTo(scaleX(w.x2),scaleY(w.y2));ctx.stroke();
    ctx.globalAlpha=alpha*0.65;ctx.strokeStyle='#e8f4ff';ctx.lineWidth=scaleR(1.2);
    ctx.beginPath();ctx.moveTo(scaleX(w.x1),scaleY(w.y1));ctx.lineTo(scaleX(w.x2),scaleY(w.y2));ctx.stroke();
    ctx.restore();
  }
}

function tickParticles(dt) {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=dt/500;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life*0.8;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(scaleX(p.x),scaleY(p.y),scaleR(3*p.life),0,Math.PI*2);ctx.fill();ctx.restore();
  }
}
function tickShockwaves(dt) {
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];s.r+=(s.maxR-s.r)*0.18;s.life-=dt/350;
    if(s.life<=0){shockwaves.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=s.life*0.5;ctx.strokeStyle=s.color;ctx.lineWidth=s.life*2.5;
    ctx.beginPath();ctx.arc(scaleX(s.x),scaleY(s.y),scaleR(s.r),0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}
function tickDamageNumbers(dt) {
  for(let i=damageNumbers.length-1;i>=0;i--){
    const d=damageNumbers[i];d.y+=d.vy;d.vy*=0.96;d.life-=dt/750;
    if(d.life<=0){damageNumbers.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=d.life;ctx.fillStyle=d.color;ctx.font=`bold ${scaleR(13)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.text,scaleX(d.x),scaleY(d.y));ctx.restore();
  }
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
let lastRender = 0;
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  if (document.getElementById('game').style.display !== 'block') return;
  const dt = lastRender ? Math.min(ts-lastRender, 50) : 16;
  lastRender = ts;

  shakeAmt *= 0.82;
  const sx=(Math.random()-0.5)*shakeAmt, sy=(Math.random()-0.5)*shakeAmt;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.save(); ctx.translate(sx, sy);

  if (serverState) {
    drawWebs(serverState.webs);
    for (const b of serverState.balls) drawBall(b);

    // Challenger reticles
    for (const b of serverState.balls) {
      if (b.role!=='challenger'||!b.alive||!b.challengeTargetId) continue;
      const t=serverState.balls.find(x=>x.id===b.challengeTargetId);
      if (!t||!t.alive) continue;
      const tx=scaleX(t.x),ty=scaleY(t.y),tr=scaleR(t.radius)+scaleR(13);
      const pulse=0.5+0.5*Math.abs(Math.sin(Date.now()/240));
      ctx.save();ctx.globalAlpha=pulse*0.85;ctx.strokeStyle=b.color;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(tx,ty,tr,0,Math.PI*2);ctx.stroke();
      for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(tx+Math.cos(a)*tr,ty+Math.sin(a)*tr);ctx.lineTo(tx+Math.cos(a)*(tr+scaleR(8)),ty+Math.sin(a)*(tr+scaleR(8)));ctx.stroke();}
      ctx.restore();
    }
  }

  tickParticles(dt); tickShockwaves(dt); tickDamageNumbers(dt);
  ctx.restore();
}
requestAnimationFrame(renderLoop);
</script>
</body>
</html>
